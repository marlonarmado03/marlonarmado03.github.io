<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marlon Armado | CV</title>
  <style>
    :root {
      --bg: #070707;
      --card: #121212;
      --text: #f4f4f4;
      --muted: #b8b8b8;
      --line: #2b2b2b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 10%, #1a1a1a 0%, var(--bg) 45%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .wrap {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
    }

    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 26px;
    }

    p {
      color: var(--muted);
      margin-bottom: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      border: 1px solid #fff;
      border-radius: 999px;
      padding: 9px 14px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: 0.25s ease;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    iframe {
      width: 100%;
      height: 70vh;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="head">
      <h1>Curriculum Vitae</h1>
      <div class="actions">
        <a class="btn" href="Images/resume.pdf" download>Download PDF</a>
        <a class="btn" href="index.html#about">Back to Portfolio</a>
      </div>
    </div>
    <p>Preview and download my latest CV below.</p>
    <iframe src="Images/resume.pdf" title="Marlon Armado Resume"></iframe>
  </main>
</body>

</html>
